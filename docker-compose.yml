services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    container_name: shipflow-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipflow_dev

    ports:
      - "5433:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: shipflow-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    container_name: shipflow-inngest

    ports:
      - "8288:8288"

    environment:
      INNGEST_LOG_LEVEL: debug

    command: ["inngest", "dev", "-u", "http://host.docker.internal:8000/api/inngest"]

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_data:
  redis_data:
