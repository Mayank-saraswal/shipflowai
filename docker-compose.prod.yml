version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    container_name: shipflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shipflow_prod}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: shipflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/mayank-saraswal/shipflowai/api:latest
    restart: unless-stopped
    container_name: shipflow-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.production

  web:
    image: ghcr.io/mayank-saraswal/shipflowai/web:latest
    restart: unless-stopped
    container_name: shipflow-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    env_file:
      - .env.production

  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    container_name: shipflow-inngest
    ports:
      - "8288:8288"
    environment:
      INNGEST_LOG_LEVEL: info
    command: ["inngest", "dev", "-u", "http://api:8000/api/inngest"]

volumes:
  pg_data:
  redis_data:
